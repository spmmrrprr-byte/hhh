    <script>
        // Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const debug = document.getElementById('debug');
        function log(msg) {
            debug.innerHTML = msg + '<br>' + debug.innerHTML.substring(0, 100);
            console.log(msg);
        }

        // Canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const touchLayer = document.getElementById('touchLayer');
        const container = document.getElementById('gameContainer');

        // Размеры canvas
        function resize() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            log(`Resize: ${canvas.width}x${canvas.height}`);
            if (!gameState.running) draw();
        }

        // Ждём загрузки
        window.addEventListener('load', () => {
            setTimeout(resize, 100);
            setTimeout(resize, 500);
        });
        window.addEventListener('resize', resize);

        // ELO
        const ELO_CONFIG = {
            MAX_ELO: 5000,
            START_ELO: 1000,
            K_FACTOR_BASE: 32,
            BOT_ELO: 1200,
            RANKS: [
                { name: 'Бронза III', min: 0, max: 1099, class: 'elo-bronze' },
                { name: 'Бронза II', min: 1100, max: 1199, class: 'elo-bronze' },
                { name: 'Бронза I', min: 1200, max: 1299, class: 'elo-bronze' },
                { name: 'Серебро III', min: 1300, max: 1399, class: 'elo-silver' },
                { name: 'Серебро II', min: 1400, max: 1499, class: 'elo-silver' },

{ name: 'Серебро I', min: 1500, max: 1599, class: 'elo-silver' },
                { name: 'Золото III', min: 1600, max: 1799, class: 'elo-gold' },
                { name: 'Золото II', min: 1800, max: 1999, class: 'elo-gold' },
                { name: 'Золото I', min: 2000, max: 2199, class: 'elo-gold' },
                { name: 'Платина III', min: 2200, max: 2399, class: 'elo-platinum' },
                { name: 'Платина II', min: 2400, max: 2599, class: 'elo-platinum' },
                { name: 'Платина I', min: 2600, max: 2799, class: 'elo-platinum' },
                { name: 'Алмаз III', min: 2800, max: 2999, class: 'elo-diamond' },
                { name: 'Алмаз II', min: 3000, max: 3199, class: 'elo-diamond' },
                { name: 'Алмаз I', min: 3200, max: 3499, class: 'elo-diamond' },
                { name: 'Мастер III', min: 3500, max: 3749, class: 'elo-master' },
                { name: 'Мастер II', min: 3750, max: 3999, class: 'elo-master' },
                { name: 'Мастер I', min: 4000, max: 4249, class: 'elo-master' },
                { name: 'Грандмастер', min: 4250, max: 4499, class: 'elo-grandmaster' },
                { name: 'Легенда', min: 4500, max: 5000, class: 'elo-legend' }
            ]
        };

        let eloData = {
            current: ELO_CONFIG.START_ELO,
            max: ELO_CONFIG.START_ELO,
            wins: 0,
            losses: 0,
            streak: 0,
            maxStreak: 0,
            history: []
        };

        function loadElo() {
            const saved = localStorage.getItem('hockeyElo');
            if (saved) eloData = JSON.parse(saved);
            updateEloUI();
        }

        function saveElo() {
            localStorage.setItem('hockeyElo', JSON.stringify(eloData));
        }

        function getRank(elo) {
            return ELO_CONFIG.RANKS.find(r => elo >= r.min && elo <= r.max) || ELO_CONFIG.RANKS[0];
        }

        function calculateEloChange(playerElo, opponentElo, result) {
            const expected = 1 / (1 + Math.pow(10, (opponentElo - playerElo) / 400));
            let k = ELO_CONFIG.K_FACTOR_BASE;
            if (playerElo > 2400) k = 16;
            else if (playerElo > 2000) k = 24;
            if (eloData.streak >= 3) k *= 1.1;
            const change = Math.round(k * (result - expected));
            return Math.max(-50, Math.min(50, change));
        }

        function updateElo(won, stats) {
            const change = calculateEloChange(eloData.current, ELO_CONFIG.BOT_ELO, won ? 1 : 0);
            const oldElo = eloData.current;
            eloData.current = Math.max(0, Math.min(ELO_CONFIG.MAX_ELO, eloData.current + change));
            eloData.max = Math.max(eloData.max, eloData.current);
            
            if (won) {
                eloData.wins++;
                eloData.streak = eloData.streak > 0 ? eloData.streak + 1 : 1;
            } else {
                eloData.losses++;
                eloData.streak = eloData.streak < 0 ? eloData.streak - 1 : -1;
            }
            
            eloData.maxStreak = Math.max(eloData.maxStreak, Math.abs(eloData.streak));
            
            eloData.history.unshift({
                date: new Date().toISOString(),
                result: won ? 'win' : 'loss',
                score: `${gameState.playerScore}:${gameState.botScore}`,
                eloChange: change,
                eloAfter: eloData.current,
                duration: stats.duration,
                shots: stats.shots
            });
            
            if (eloData.history.length > 50) eloData.history.pop();
            saveElo();
            updateEloUI();
            return { change, oldElo };
        }

        function updateEloUI() {
            const rank = getRank(eloData.current);
            const pct = (eloData.current / ELO_CONFIG.MAX_ELO) * 100;
            
            document.getElementById('eloValue').textContent = eloData.current;

document.getElementById('eloRank').textContent = rank.name;
            const bar = document.getElementById('eloProgress');
            bar.className = `elo-progress ${rank.class}`;
            bar.style.width = pct + '%';
        }

        // Игра
        const GAME_DURATION = 180;
        const WIN_SCORE = 5;
        const FRICTION = 0.985;
        const MAX_SPEED = 15;

        let gameState = {
            running: false,
            paused: false,
            timeRemaining: GAME_DURATION,
            playerScore: 0,
            botScore: 0,
            shots: 0,
            startTime: null
        };

        let puck = { x: 0, y: 0, vx: 0, vy: 0, radius: 10, color: '#fff' };
        let player = { x: 0, y: 0, radius: 22, color: '#4ecdc4', targetX: 0, targetY: 0 };
        let bot = { x: 0, y: 0, radius: 22, color: '#ff6b6b', speed: 3.5 };

        function resetPositions() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            puck.x = cx;
            puck.y = cy;
            puck.vx = 0;
            puck.vy = 0;
            
            player.x = cx;
            player.y = canvas.height - 60;
            player.targetX = player.x;
            player.targetY = player.y;
            
            bot.x = cx;
            bot.y = 60;
        }

        // ========== ОБРАБОТКА ВВОДА - ГЛАВНЫЙ ФИКС ==========
        
        function getPos(clientX, clientY) {
            const rect = container.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function setPlayerTarget(x, y) {
            // Ограничение: только нижняя половина
            const minY = canvas.height / 2 + player.radius;
            const maxY = canvas.height - player.radius - 5;
            const minX = player.radius;
            const maxX = canvas.width - player.radius;
            
            player.targetX = Math.max(minX, Math.min(maxX, x));
            player.targetY = Math.max(minY, Math.min(maxY, y));
        }

        let isTouching = false;

        // Обработчики на touchLayer (не на canvas!)
        touchLayer.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            log('TOUCH start');
            
            if (!gameState.running) {
                startGame();
                return;
            }
            
            isTouching = true;
            const t = e.touches[0];
            const pos = getPos(t.clientX, t.clientY);
            setPlayerTarget(pos.x, pos.y);
            
        }, {passive: false, capture: true});

        touchLayer.addEventListener('touchmove', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!gameState.running || !isTouching) return;
            
            const t = e.touches[0];
            const pos = getPos(t.clientX, t.clientY);
            setPlayerTarget(pos.x, pos.y);
            
        }, {passive: false, capture: true});

        touchLayer.addEventListener('touchend', function(e) {
            e.preventDefault();
            isTouching = false;
            log('TOUCH end');
        }, {passive: false, capture: true});

        touchLayer.addEventListener('touchcancel', function(e) {
            isTouching = false;
            log('TOUCH cancel');
        }, {passive: false, capture: true});

        // Мышь для теста
        touchLayer.addEventListener('mousedown', function(e) {
            e.preventDefault();
            log('MOUSE down');
            
            if (!gameState.running) {
                startGame();
                return;
            }
            
            isTouching = true;
            const pos = getPos(e.clientX, e.clientY);
            setPlayerTarget(pos.x, pos.y);
        });

        touchLayer.addEventListener('mousemove', function(e) {
07:23
if (!isTouching || !gameState.running) return;
            e.preventDefault();
            const pos = getPos(e.clientX, e.clientY);
            setPlayerTarget(pos.x, pos.y);
        });

        touchLayer.addEventListener('mouseup', function(e) {
            isTouching = false;
            log('MOUSE up');
        });

        touchLayer.addEventListener('mouseleave', function() {
            isTouching = false;
        });

        // Клик как запасной вариант
        touchLayer.addEventListener('click', function(e) {
            log('CLICK');
            if (!gameState.running) startGame();
        });

        // Физика
        function updatePlayer() {

        function updatePuck() {

                if (puck.y + puck.radius > canvas.height) {
