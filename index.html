<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sirius Clicker - Brawl Stars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
            position: relative;
        }
        
        /* Звёздный фон */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Шапка */
        .header {
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 10px;
            position: relative;
            z-index: 10;
            text-align: center;
        }
        
        .game-title {
            font-family: 'Lilita One', cursive;
            font-size: 24px;
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }
        
        /* Счётчик */
        .score-container {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 10px 20px;
            margin: 8px auto;
            max-width: 250px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .score-label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .score-value {
            font-family: 'Lilita One', cursive;
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            min-height: 40px;
        }
        
        .per-second {
            font-size: 12px;
            color: #4ecdc4;
            margin-top: 3px;
        }
        
        /* Зона клика */
        .click-zone {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        
        .sirius-container {
            position: relative;
            width: 180px;
            height: 180px;
            cursor: pointer;
            transition: transform 0.1s;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            z-index: 10;
        }
        
        .sirius-container:active {
            transform: scale(0.9);
        }
        
        .sirius-container.clicked {
            animation: bounce 0.3s ease;
        }
        
        @keyframes bounce {
00:26
0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .sirius-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
            pointer-events: none;
        }
        
        /* Аура вокруг Сириуса */
        .aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%);
            animation: pulse 2s infinite;
            pointer-events: none;
            z-index: 1;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }
        
        /* Частицы */
        .particle {
            position: fixed;
            pointer-events: none;
            font-weight: 900;
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        }
        
        @keyframes floatUp {
            0% { 
                transform: translateY(0) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(-100px) scale(1.5); 
                opacity: 0; 
            }
        }
        
        /* Магазин улучшений */
        .shop-section {
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(20,20,40,0.95) 100%);
            border-radius: 25px 25px 0 0;
            padding: 15px;
            margin-top: 15px;
            position: relative;
            z-index: 10;
            min-height: 250px;
        }
        
        .shop-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .shop-title {
            font-family: 'Lilita One', cursive;
            font-size: 20px;
            color: #ffd700;
        }
        
        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 350px;
            overflow-y: auto;
        }
        
        .upgrade-item {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .upgrade-item:hover {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
            border-color: #ffd700;
            transform: translateX(5px);
        }
        
        .upgrade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .upgrade-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .upgrade-info {
            flex: 1;
        }
        
        .upgrade-name {
            font-weight: 900;
            font-size: 14px;
            color: white;
            margin-bottom: 2px;
        }
        
        .upgrade-desc {
00:26
font-size: 11px;
            color: #aaa;
        }
        
        .upgrade-cost {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            padding: 6px 12px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .upgrade-level {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            color: #4ecdc4;
            font-weight: 700;
        }
        
        /* Достижения */
        .achievements {
            display: flex;
            gap: 8px;
            padding: 8px;
            overflow-x: auto;
            margin-bottom: 8px;
            justify-content: center;
        }
        
        .achievement {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px;
            min-width: 70px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .achievement.unlocked {
            border-color: #ffd700;
            background: rgba(255,215,0,0.2);
            animation: glow 2s infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }
        
        .achievement-icon {
            font-size: 20px;
            margin-bottom: 3px;
        }
        
        .achievement-name {
            font-size: 9px;
            color: #aaa;
        }
        
        /* Кнопки управления */
        .controls {
            display: flex;
            gap: 8px;
            padding: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        /* Эффект критического удара */
        .critical {
            position: fixed;
            font-family: 'Lilita One', cursive;
            font-size: 36px;
            color: #ff006e;
            text-shadow: 0 0 20px rgba(255,0,110,0.8);
            pointer-events: none;
            animation: criticalPop 0.8s ease-out forwards;
            z-index: 2000;
            transform: translate(-50%, -50%);
        }
        
        @keyframes criticalPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.5) rotate(10deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg) translateY(-150px); opacity: 0; }
        }
        
        /* Комбо система */
        .combo {
            position: fixed;
            top: 80px;
            right: 15px;
            background: linear-gradient(135deg, rgba(255,0,110,0.9), rgba(255,0,110,0.6));
            padding: 8px 16px;
            border-radius: 15px;
            font-family: 'Lilita One', cursive;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
            border: 2px solid #ff006e;
        }
        
        .combo.active {
            opacity: 1;
00:26
animation: comboPulse 0.5s infinite alternate;
        }
        
        @keyframes comboPulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        /* Уведомление */
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #1a0a2e;
            padding: 15px 30px;
            border-radius: 15px;
            font-family: 'Lilita One', cursive;
            font-size: 20px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            box-shadow: 0 0 50px rgba(255,215,0,0.5);
        }
        
        .notification.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        /* Отладочная информация */
        .debug {
            position: fixed;
            bottom: 5px;
            left: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- Звёздный фон -->
    <div class="stars" id="stars"></div>
    
    <!-- Комбо счётчик -->
    <div class="combo" id="combo">COMBO x<span id="comboValue">1</span></div>
    
    <!-- Уведомления -->
    <div class="notification" id="notification"></div>
    
    <div class="header">
        <h1 class="game-title">⭐ SIRIUS CLICKER ⭐</h1>
        <div class="score-container">
            <div class="score-label">Звёздная энергия</div>
            <div class="score-value" id="score">0</div>
            <div class="per-second" id="perSecond">+0/сек</div>
        </div>
    </div>
    
    <!-- Достижения -->
    <div class="achievements" id="achievements">
        <div class="achievement unlocked" data-id="start">
            <div class="achievement-icon">🌟 </div>
            <div class="achievement-name">Начало</div>
        </div>
        <div class="achievement" data-id="100clicks">
            <div class="achievement-icon">👆</div>
            <div class="achievement-name">100 кликов</div>
        </div>
        <div class="achievement" data-id="1000stars">
            <div class="achievement-icon">💫 </div>
            <div class="achievement-name">1000 звёзд</div>
        </div>
        <div class="achievement" data-id="firstUpgrade">
            <div class="achievement-icon">⬆️ </div>
            <div class="achievement-name">Первое улучшение</div>
        </div>
        <div class="achievement" data-id="master">
            <div class="achievement-icon">👑 </div>
            <div class="achievement-name">Мастер</div>
        </div>
    </div>
    
    <!-- Зона клика -->
    <div class="click-zone">
        <div class="aura"></div>
        <div class="sirius-container" id="sirius">
            <img src="https://kimi-web-img.moonshot.cn/img/static.wikia.nocookie.net/1324b6528aca968c28e488e139f7a9b9527cdb5d" 
                 alt="Sirius" 
                 class="sirius-img"
                 onerror="this.src='https://kimi-web-img.moonshot.cn/img/static.wikia.nocookie.net/b0d8dbe3c7b7487d8e88eeb319c1203cf58af81d'">
        </div>
    </div>
    
    <!-- Управление -->
    <div class="controls">
        <button class="btn" onclick="game.saveProgress()">💾  Сохранить</button>
        <button class="btn btn-secondary" onclick="game.reset()">🔄  Сброс</button>
    </div>
    
    <!-- Магазин -->
    <div class="shop-section">
        <div class="shop-header">
            <span style="font-size: 20px;">🛒 </span>
            <h2 class="shop-title">Улучшения</h2>
        </div>
        <div class="upgrade-list" id="upgradeList"></div>
    </div>

    <div class="debug" id="debug"></div>

    <script>
        // Инициализация Telegram WebApp
        let tg;
        try {
            tg = window.Telegram.WebApp;
            tg.expand();
00:26
tg.ready();
        } catch(e) {
            console.log('Telegram WebApp not available');
            tg = { HapticFeedback: null };
        }
        
        // Игра
        class SiriusClicker {
            constructor() {
                this.score = 0;
                this.totalClicks = 0;
                this.clickPower = 1;
                this.autoClick = 0;
                this.combo = 0;
                this.comboTimer = null;
                this.lastClickTime = 0;
                this.criticalChance = 0;
                
                this.upgrades = [
                    {
                        id: 'power',
                        name: 'Сила Звезды',
                        desc: '+1 к силе клика',
                        icon: '⚡',
                        baseCost: 50,
                        cost: 50,
                        level: 0,
                        effect: () => { this.clickPower += 1; },
                        type: 'click'
                    },
                    {
                        id: 'auto',
                        name: 'Звёздный Дождь',
                        desc: '+1 авто-клик/сек',
                        icon: '☄️ ',
                        baseCost: 100,
                        cost: 100,
                        level: 0,
                        effect: () => { this.autoClick += 1; },
                        type: 'auto'
                    },
                    {
                        id: 'critical',
                        name: 'Критический Удар',
                        desc: 'Шанс x3 урона',
                        icon: '💥 ',
                        baseCost: 500,
                        cost: 500,
                        level: 0,
                        effect: () => { this.criticalChance += 0.1; },
                        type: 'special'
                    },
                    {
                        id: 'multitap',
                        name: 'Мультитап',
                        desc: '+3 к силе клика',
                        icon: '👆',
                        baseCost: 250,
                        cost: 250,
                        level: 0,
                        effect: () => { this.clickPower += 3; },
                        type: 'click'
                    },
                    {
                        id: 'supernova',
                        name: 'Сверхновая',
                        desc: '+5 авто-клик/сек',
                        icon: '🌌 ',
                        baseCost: 1000,
                        cost: 1000,
                        level: 0,
                        effect: () => { this.autoClick += 5; },
                        type: 'auto'
                    },
                    {
                        id: 'cosmic',
                        name: 'Космическая Сила',
                        desc: 'x2 ко всему урону',
                        icon: '🌠 ',
                        baseCost: 5000,
                        cost: 5000,
                        level: 0,
                        effect: () => { this.clickPower *= 2; this.autoClick *= 2; },
                        type: 'special'
                    }
                ];
                
                this.achievements = {
                    start: true,
                    '100clicks': false,
                    '1000stars': false,
                    firstUpgrade: false,
                    master: false
                };
                
                this.init();
            }
            
            init() {
                this.loadProgress();
                this.createStars();
                this.renderUpgrades();
                this.setupEventListeners();
                this.startAutoClick();
                this.updateDisplay();
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
                
                // Отладка
                this.log('Game initialized');
00:26
}
            
            log(msg) {
                console.log(msg);
                const debug = document.getElementById('debug');
                if (debug) debug.textContent = msg;
            }
            
            createStars() {
                const container = document.getElementById('stars');
                for (let i = 0; i < 50; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.width = Math.random() * 3 + 1 + 'px';
                    star.style.height = star.style.width;
                    star.style.animationDelay = Math.random() * 2 + 's';
                    container.appendChild(star);
                }
            }
            
            setupEventListeners() {
                const sirius = document.getElementById('sirius');
                
                // Клик мышью
                sirius.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    this.handleClick(e);
                });
                
                // Касание пальцем
                sirius.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const touch = e.touches[0];
                    this.handleClick({
                        clientX: touch.clientX,
                        clientY: touch.clientY,
                        preventDefault: () => {},
                        stopPropagation: () => {}
                    });
                }, {passive: false});
                
                // Двойное касание (предотвращение зума)
                sirius.addEventListener('touchend', (e) => {
                    e.preventDefault();
                }, {passive: false});
            }
            
            handleClick(e) {
                this.log('Click detected!');
                
                // Гарантированно получаем координаты
                let x = e.clientX;
                let y = e.clientY;
                
                // Если координаты не определены, используем центр экрана
                if (!x || !y) {
                    x = window.innerWidth / 2;
                    y = window.innerHeight / 2;
                }
                
                const now = Date.now();
                
                // Система комбо
                if (now - this.lastClickTime < 500) {
                    this.combo++;
                    this.showCombo();
                } else {
                    this.combo = 1;
                }
                this.lastClickTime = now;
                
                // Расчёт урона с комбо
                let damage = this.clickPower * (1 + Math.floor(this.combo / 10) * 0.1);
                
                // Критический удар
                let isCritical = false;
                if (this.criticalChance > 0 && Math.random() < this.criticalChance) {
                    damage *= 3;
                    isCritical = true;
                }
                
                damage = Math.floor(damage);
                
                // Добавляем очки
                this.score += damage;
                this.totalClicks++;
                
                this.log(`Damage: ${damage}, Total: ${this.score}`);
                
                // Визуальные эффекты
                this.createParticle(x, y, damage, isCritical);
                if (isCritical) {
                    this.showCritical(x, y);
                }
                this.animateSirius();
                
                // Вибрация
                if (tg.HapticFeedback) {
                    try {
                        tg.HapticFeedback.impactOccurred(isCritical ? 'heavy' : 'medium');
00:26
} catch(e) {}
                }
                
                // Проверка достижений
                this.checkAchievements();
                this.updateDisplay();
                
                // Сброс комбо
                clearTimeout(this.comboTimer);
                this.comboTimer = setTimeout(() => {
                    this.combo = 0;
                    document.getElementById('combo').classList.remove('active');
                }, 2000);
            }
            
            showCombo() {
                const comboEl = document.getElementById('combo');
                const comboValue = document.getElementById('comboValue');
                comboValue.textContent = this.combo;
                comboEl.classList.add('active');
                
                if (this.combo > 0 && this.combo % 10 === 0) {
                    this.showNotification(`Комбо x${this.combo}! 🔥 `);
                }
            }
            
            showCritical(x, y) {
                const crit = document.createElement('div');
                crit.className = 'critical';
                crit.textContent = 'CRITICAL!';
                crit.style.left = x + 'px';
                crit.style.top = y + 'px';
                document.body.appendChild(crit);
                setTimeout(() => crit.remove(), 800);
            }
            
            createParticle(x, y, value, isCritical) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = '+' + value;
                particle.style.left = (x - 20) + 'px';
                particle.style.top = (y - 50) + 'px';
                
                if (isCritical) {
                    particle.style.color = '#ff006e';
                    particle.style.fontSize = '32px';
                }
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
            
            animateSirius() {
                const sirius = document.getElementById('sirius');
                sirius.classList.remove('clicked');
                void sirius.offsetWidth; // Trigger reflow
                sirius.classList.add('clicked');
                setTimeout(() => sirius.classList.remove('clicked'), 300);
            }
            
            buyUpgrade(index) {
                const upgrade = this.upgrades[index];
                
                if (this.score >= upgrade.cost) {
                    this.score -= upgrade.cost;
                    upgrade.level++;
                    upgrade.cost = Math.floor(upgrade.baseCost * Math.pow(1.15, upgrade.level));
                    upgrade.effect();
                    
                    if (tg.HapticFeedback) {
                        try {
                            tg.HapticFeedback.notificationOccurred('success');
                        } catch(e) {}
                    }
                    
                    this.showNotification(`${upgrade.name} куплено!`);
                    
                    if (!this.achievements.firstUpgrade) {
                        this.achievements.firstUpgrade = true;
                        this.unlockAchievement('firstUpgrade');
                    }
                    
                    this.checkAchievements();
                    this.renderUpgrades();
                    this.updateDisplay();
                } else {
                    if (tg.HapticFeedback) {
                        try {
                            tg.HapticFeedback.notificationOccurred('error');
                        } catch(e) {}
                    }
                }
            }
            
            renderUpgrades() {
                const list = document.getElementById('upgradeList');
                list.innerHTML = '';
                
                this.upgrades.forEach((upgrade, index) => {
00:26
const item = document.createElement('div');
                    item.className = 'upgrade-item ' + (this.score < upgrade.cost ? 'disabled' : '');
                    item.innerHTML = `
                        <div class="upgrade-icon">${upgrade.icon}</div>
                        <div class="upgrade-info">
                            <div class="upgrade-name">${upgrade.name}</div>
                            <div class="upgrade-desc">${upgrade.desc}</div>
                        </div>
                        <div class="upgrade-cost">
                            <span>⭐</span>
                            <span>${upgrade.cost}</span>
                        </div>
                        <div class="upgrade-level">Lv.${upgrade.level}</div>
                    `;
                    
                    item.onclick = () => this.buyUpgrade(index);
                    list.appendChild(item);
                });
            }
            
            startAutoClick() {
                setInterval(() => {
                    if (this.autoClick > 0) {
                        this.score += this.autoClick;
                        this.updateDisplay();
                        
                        if (Math.random() < 0.3) {
                            const rect = document.getElementById('sirius').getBoundingClientRect();
                            this.createParticle(
                                rect.left + rect.width/2 + (Math.random() - 0.5) * 100,
                                rect.top + rect.height/2,
                                this.autoClick,
                                false
                            );
                        }
                    }
                }, 1000);
            }
            
            checkAchievements() {
                if (this.totalClicks >= 100 && !this.achievements['100clicks']) {
                    this.achievements['100clicks'] = true;
                    this.unlockAchievement('100clicks');
                }
                if (this.score >= 1000 && !this.achievements['1000stars']) {
                    this.achievements['1000stars'] = true;
                    this.unlockAchievement('1000stars');
                }
                if (this.score >= 10000 && !this.achievements.master) {
                    this.achievements.master = true;
                    this.unlockAchievement('master');
                }
            }
            
            unlockAchievement(id) {
                const el = document.querySelector(`[data-id="${id}"]`);
                if (el) {
                    el.classList.add('unlocked');
                    this.showNotification(`Достижение разблокировано! 🏆`);
                    if (tg.HapticFeedback) {
                        try {
                            tg.HapticFeedback.notificationOccurred('success');
                        } catch(e) {}
                    }
                }
            }
            
            showNotification(text) {
                const notif = document.getElementById('notification');
                notif.textContent = text;
                notif.classList.add('show');
                setTimeout(() => notif.classList.remove('show'), 2000);
            }
            
            updateDisplay() {
                const scoreEl = document.getElementById('score');
                scoreEl.textContent = this.score.toLocaleString();
                document.getElementById('perSecond').textContent = `+${this.autoClick}/сек | Сила: ${this.clickPower}`;
                this.renderUpgrades();
            }
            
            saveProgress() {
                const data = {
                    score: this.score,
                    totalClicks: this.totalClicks,
                    clickPower: this.clickPower,
                    autoClick: this.autoClick,
                    upgrades: this.upgrades,
                    achievements: this.achievements,
                    criticalChance: this.criticalChance
00:26
};
                
                try {
                    localStorage.setItem('siriusClicker', JSON.stringify(data));
                } catch(e) {}
                
                if (tg.CloudStorage) {
                    try {
                        tg.CloudStorage.setItem('gameData', JSON.stringify(data));
                    } catch(e) {}
                }
                
                this.showNotification('Прогресс сохранён! 💾 ');
                if (tg.HapticFeedback) {
                    try {
                        tg.HapticFeedback.notificationOccurred('success');
                    } catch(e) {}
                }
            }
            
            loadProgress() {
                try {
                    const saved = localStorage.getItem('siriusClicker');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.score = data.score || 0;
                        this.totalClicks = data.totalClicks || 0;
                        this.clickPower = data.clickPower || 1;
                        this.autoClick = data.autoClick || 0;
                        this.criticalChance = data.criticalChance || 0;
                        
                        if (data.upgrades) {
                            data.upgrades.forEach((u, i) => {
                                if (this.upgrades[i]) {
                                    this.upgrades[i].level = u.level;
                                    this.upgrades[i].cost = u.cost;
                                }
                            });
                        }
                        
                        if (data.achievements) {
                            Object.keys(data.achievements).forEach(key => {
                                if (data.achievements[key]) {
                                    this.achievements[key] = true;
                                    const el = document.querySelector(`[data-id="${key}"]`);
                                    if (el) el.classList.add('unlocked');
                                }
                            });
                        }
                    }
                } catch(e) {}
            }
            
            reset() {
                if (confirm('Сбросить весь прогресс?')) {
                    try {
                        localStorage.removeItem('siriusClicker');
                    } catch(e) {}
                    location.reload();
                }
            }
        }
        
        // Запуск игры после загрузки DOM
        let game;
        document.addEventListener('DOMContentLoaded', () => {
            game = new SiriusClicker();
        });
        
        // Автосохранение
        setInterval(() => {
            if (game) game.saveProgress();
        }, 30000);
        
        // Сохранение при сворачивании
        if (tg && tg.onEvent) {
            tg.onEvent('viewportChanged', () => {
                if (game) game.saveProgress();
            });
        }
    </script>
</body>
</html>
