<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }
        .score {
            font-size: 64px;
            font-weight: 800;
            color: #e94560;
            margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        .click-btn {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #e94560);
            font-size: 100px;
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s ease;
            position: relative;
            z-index: 10;
        }
        .click-btn:active {
            transform: scale(0.92);
        }
        .plus {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            pointer-events: none;
            animation: fly 1s ease-out forwards;
        }
        @keyframes fly {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-150px) scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="score" id="score">0</div>
    <button class="click-btn" id="btn">👆</button>

    <script>
        // Инициализация Telegram
        let tg;
        try {
            tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
        } catch(e) {
            console.log('Telegram WebApp не доступен');
        }

        // Переменные
        let score = parseInt(localStorage.getItem('clicker_score')) || 0;
        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('btn');
        
        // Показать счёт
        scoreEl.textContent = score;

        // ОБРАБОТЧИК КЛИКА — РАБОТАЕТ ВСЕГДА
        function handleClick(e) {
            // Отменяем стандартное поведение
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            // Увеличиваем счёт
            score++;
            scoreEl.textContent = score;
            
            // Сохраняем
            localStorage.setItem('clicker_score', score);
            
            // Эффект +1
            const rect = btn.getBoundingClientRect();
            const plus = document.createElement('div');
            plus.className = 'plus';
            plus.textContent = '+1';
            plus.style.left = (rect.left + rect.width/2 - 20 + (Math.random()*40-20)) + 'px';
            plus.style.top = (rect.top) + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 1000);
            
            // Вибрация Telegram
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            console.log('Клик! Счёт:', score);
        }

        // Вешаем обработчики на ВСЕ события
        btn.addEventListener('click', handleClick);
        btn.addEventListener('touchstart', handleClick, {passive: false});

</body>
</html>
