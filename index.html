    <script>
        // Telegram

        // Canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            if (!gameState.running) draw();

        window.addEventListener('resize', resizeCanvas);

        // ELO CONFIG
        const ELO_CONFIG = {
            MAX_ELO: 5000,

                { name: 'Легенда', min: 4500, max: 5000, class: 'elo-legend' }
            ]
        };

        let eloData = {
            current: ELO_CONFIG.START_ELO,
            max: ELO_CONFIG.START_ELO,
            wins: 0,
            losses: 0,
            streak: 0,
            maxStreak: 0,
            history: []
        };

        function loadEloData() {
            const saved = localStorage.getItem('hockeyElo');
            if (saved) eloData = JSON.parse(saved);
            updateEloDisplay();
        }

        function saveEloData() {
            localStorage.setItem('hockeyElo', JSON.stringify(eloData));
        }

        function getRank(elo) {
            return ELO_CONFIG.RANKS.find(r => elo >= r.min && elo <= r.max) || ELO_CONFIG.RANKS[0];
        }

        function calculateEloChange(playerElo, opponentElo, result) {
            const expected = 1 / (1 + Math.pow(10, (opponentElo - playerElo) / 400));
            let k = ELO_CONFIG.K_FACTOR_BASE;
            if (playerElo > 2400) k = 16;
            else if (playerElo > 2000) k = 24;
            if (eloData.streak >= 3) k *= 1.1;
            const change = Math.round(k * (result - expected));
            return Math.max(-50, Math.min(50, change));
        }

        function updateElo(won, matchStats) {
            const result = won ? 1 : 0;
            const change = calculateEloChange(eloData.current, ELO_CONFIG.BOT_ELO, result);
            const oldElo = eloData.current;
            eloData.current = Math.max(0, Math.min(ELO_CONFIG.MAX_ELO, eloData.current + change));
            eloData.max = Math.max(eloData.max, eloData.current);
            
            if (won) {
                eloData.wins++;
                eloData.streak = eloData.streak > 0 ? eloData.streak + 1 : 1;
            } else {
                eloData.losses++;
                eloData.streak = eloData.streak < 0 ? eloData.streak - 1 : -1;
            }
            
            eloData.maxStreak = Math.max(eloData.maxStreak, Math.abs(eloData.streak));
            
            eloData.history.unshift({
                date: new Date().toISOString(),
                result: won ? 'win' : 'loss',
                score: `${gameState.playerScore}:${gameState.botScore}`,
                eloChange: change,
                eloAfter: eloData.current,
                duration: matchStats.duration,
                shots: matchStats.shots
            });
            
            if (eloData.history.length > 50) eloData.history.pop();
            saveEloData();
            updateEloDisplay();
            return { change, oldElo };
        }

        function updateEloDisplay() {
            const rank = getRank(eloData.current);
            const progress = (eloData.current / ELO_CONFIG.MAX_ELO) * 100;
            
            document.getElementById('eloValue').textContent = eloData.current;

            progressEl.style.width = progress + '%';
            
            document.getElementById('totalWins').textContent = eloData.wins;
            document.getElementById('totalLosses').textContent = eloData.losses;
            
            const total = eloData.wins + eloData.losses;
            const winRate = total > 0 ? Math.round((eloData.wins / total) * 100) : 0;

            const streakText = eloData.streak > 0 ? `+${eloData.streak}` : eloData.streak;

        // УЛУЧШЕННАЯ ОБРАБОТКА ВВОДА
        let touchId = null;

        function getCanvasPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function updatePlayerTarget(x, y) {
            // Ограничение зоны игрока (только нижняя половина)
            const minY = canvas.height / 2 + player.radius;
            const maxY = canvas.height - player.radius - 10;
            const minX = player.radius;
            const maxX = canvas.width - player.radius;
            
            player.targetX = Math.max(minX, Math.min(maxX, x));
            player.targetY = Math.max(minY, Math.min(maxY, y));
        }

        // Touch events с захватом указателя
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            debugInfo.textContent = 'Touch START detected';
            
            if (!gameState.running) {
                startGame();
                return;
            }
            
            const touch = e.changedTouches[0];
            touchId = touch.identifier;
            const pos = getCanvasPos(touch.clientX, touch.clientY);
            updatePlayerTarget(pos.x, pos.y);
        }, {passive: false});

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (!gameState.running || touchId === null) return;
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchId) {
                    const pos = getCanvasPos(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                    updatePlayerTarget(pos.x, pos.y);
                    debugInfo.textContent = `Touch move: ${Math.round(pos.x)},${Math.round(pos.y)}`;
                    break;
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchId) {
                    touchId = null;
                    debugInfo.textContent = 'Touch END';
                    break;
                }
            }
        }, {passive: false});

            if (!gameState.running) {
                startGame();
                return;

        canvas.addEventListener('mousemove', function(e) {

            e.preventDefault();
            const pos = getCanvasPos(e.clientX, e.clientY);

        canvas.addEventListener('mouseup', function(e) {

        function updateBot() {

        function checkCollision(paddle) {
            const dx = puck.x - paddle.x;
            const dy = puck.y - paddle.y;
            const distance = Math.sqrt(dx*dx + dy*dy);
            const minDist = puck.radius + paddle.radius;
            
            if (distance < minDist) {
                const nx = dx / distance;
                const ny = dy / distance;
                const overlap = minDist - distance;
                puck.x += nx * overlap;
                puck.y += ny * overlap;
                
                const paddleSpeed = Math.sqrt(
                    Math.pow(paddle.x - (paddle.targetX || paddle.x), 2) +
                    Math.pow(paddle.y - (paddle.targetY || paddle.y), 2)
                ) * 0.5;
                
                puck.vx = nx * (Math.sqrt(puck.vx*puck.vx + puck.vy*puck.vy) + paddleSpeed + 3);
                puck.vy = ny * (Math.sqrt(puck.vx*puck.vx + puck.vy*puck.vy) + paddleSpeed + 3);
                
                if (Math.sqrt(puck.vx*puck.vx + puck.vy*puck.vy) > MAX_SPEED) {
                    const scale = MAX_SPEED / Math.sqrt(puck.vx*puck.vx + puck.vy*puck.vy);
                    puck.vx *= scale;
                    puck.vy *= scale;
                }
                
                if (paddle === player) {

        function drawPaddle(paddle) {
